<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로젝트 메인 페이지</title>
    <style>
        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: #f8f9fa;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }
        h1 {
            font-size: 24px;
            color: #2c3e50;
            margin-bottom: 30px;
        }
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        li {
            margin-bottom: 15px;
        }
        a {
            display: block;
            text-decoration: none;
            color: #fff;
            background-color: #3498db;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }
        a:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
        }
        a:active {
            transform: translateY(0);
        }
        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>프로젝트 문서 관리</h1>
    <ul>
        <li><a href="um.html">📋 기획서 보기</a></li>

        <li><a href="tc.html">🧪 테스트케이스 보기</a></li>
    </ul>
    <div class="footer">© 2026 Project Management Index</div>
</div>

</body>
</html>
