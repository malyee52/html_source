<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D 타워 디펜스 게임 개발일지 Presentation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Pretendard:wght@400;500;600;700&display=swap');

        :root {
            --bg-gradient: linear-gradient(135deg, #0f1115 0%, #161920 100%);
            --card-bg: rgba(30, 34, 45, 0.7);
            --card-border: rgba(255, 255, 255, 0.06);
            --text-main: #f3f4f6;
            --text-sub: #9ca3af;
            
            /* 유형별 메인 테마 컬러 */
            --color-dev: #6366f1;
            --color-bal: #f59e0b;
            --color-bug: #ef4444;
            
            /* 로그 태그 컬러 */
            --tag-new: #10b981;
            --tag-mod: #3b82f6;
            --tag-bug: #f43f5e;
            --tag-bal: #eab308;
            --tag-doc: #a855f7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* 슬라이드 외곽 컨테이너 */
        .slider-wrapper {
            position: relative;
            width: 90%;
            max-width: 1080px;
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 개별 슬라이드 설정 */
        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 50px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transform: translateY(30px) scale(0.98);
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease;
            pointer-events: none;
            display: flex;
            flex-direction: column;
        }

        /* 활성화된 슬라이드 애니메이션 */
        .slide.active {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
            z-index: 10;
        }

        /* 상단 고정 헤더 영역 */
        .slide-header {
            flex-shrink: 0; /* 절대 줄어들지 않음 */
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 20px;
        }

        .title-area {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .phase-badge {
            align-self: flex-start;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .phase-dev { background: rgba(99, 102, 241, 0.15); color: #a5b4fc; border: 1px solid rgba(99, 102, 241, 0.3); }
        .phase-bal { background: rgba(245, 158, 11, 0.15); color: #fde047; border: 1px solid rgba(245, 158, 11, 0.3); }
        .phase-bug { background: rgba(239, 68, 68, 0.15); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); }

        .slide-title {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #ffffff, #e5e7eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .slide-date {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            color: var(--text-sub);
            background: rgba(255, 255, 255, 0.04);
            padding: 6px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* 중앙 가변 스크롤 내용 영역 - 절대 겹치지 않도록 유연하게 설정 */
        .slide-content {
            flex: 1; 
            overflow-y: auto; /* 내용이 많으면 내부 스크롤 제공 */
            padding-right: 10px;
            margin-bottom: 20px; /* 하단 컨트롤바와의 마진 분리 */
        }

        .log-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .log-item {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            background: rgba(255, 255, 255, 0.02);
            padding: 16px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            transition: background 0.2s ease;
        }

        .log-item:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        /* 내부 태그 라벨 */
        .tag {
            flex-shrink: 0;
            width: 64px;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 700;
            padding: 4px 0;
            border-radius: 6px;
        }
        .tag-new { color: var(--tag-new); background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); }
        .tag-mod { color: var(--tag-mod); background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.2); }
        .tag-bug { color: var(--tag-bug); background: rgba(244, 63, 94, 0.1); border: 1px solid rgba(244, 63, 94, 0.2); }
        .tag-bal { color: var(--tag-bal); background: rgba(234, 179, 8, 0.1); border: 1px solid rgba(234, 179, 8, 0.2); }
        .tag-doc { color: var(--tag-doc); background: rgba(168, 85, 247, 0.1); border: 1px solid rgba(168, 85, 247, 0.2); }

        .text-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .log-text {
            font-size: 1.05rem;
            line-height: 1.6;
            font-weight: 500;
        }

        .note {
            font-size: 0.9rem;
            color: #9ca3af;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 0, 0, 0.15);
            padding: 4px 10px;
            border-radius: 6px;
            align-self: flex-start;
            margin-top: 4px;
        }

        /* 하단 네비게이션 컨트롤러 */
        .controls {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 24px;
            margin-top: 25px;
            z-index: 100;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px 28px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn:disabled {
            background: rgba(255, 255, 255, 0.01);
            color: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.02);
            cursor: not-allowed;
            transform: none;
        }

        .page-info {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-sub);
            background: rgba(0, 0, 0, 0.2);
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* 안내 단축키 탑 배너 */
        .shortcut-tip {
            position: fixed;
            top: 24px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 6px 16px;
            border-radius: 30px;
            letter-spacing: 0.3px;
        }

        /* 스크롤바 세련되게 커스텀 */
        .slide-content::-webkit-scrollbar { width: 6px; }
        .slide-content::-webkit-scrollbar-track { background: transparent; }
        .slide-content::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        .slide-content::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
    </style>
</head>

        const tagMap = {
            new: { class: "tag-new", label: "신규" },
            mod: { class: "tag-mod", label: "개선" },
            bug: { class: "tag-bug", label: "버그" },
            bal: { class: "tag-bal", label: "밸런스" },
            doc: { class: "tag-doc", label: "문서" }
        };

        const slider = document.getElementById('slider');
        let currentSlide = 0;

        // 슬라이드 DOM 빌드
        function createSlides() {
            devLogData.forEach((data, index) => {
                const slide = document.createElement('div');
                slide.className = `slide ${index === 0 ? 'active' : ''}`;
                
                let logItemsHtml = data.logs.map(log => {
                    const tag = tagMap[log.type];
                    return `
                        <li class="log-item">
                            <div class="tag ${tag.class}">${tag.label}</div>
                            <div class="text-container">
                                <span class="log-text">${log.text}</span>
                                ${log.note ? `<span class="note">💡 ${log.note}</span>` : ''}
                            </div>
                        </li>
                    `;
                }).join('');

                slide.innerHTML = `
                    <div class="slide-header">
                        <div class="title-area">
                            <div><span class="phase-badge ${data.phaseClass}">${data.phase}</span></div>
                            <h2 class="slide-title">${data.title}</h2>
                        </div>
                        <span class="slide-date">${data.date}</span>
                    </div>
                    <div class="slide-content">
                        <ul class="log-list">${logItemsHtml}</ul>
                    </div>
                `;
                slider.appendChild(slide);
            });
        }

        // 제어 상태 및 UI 업데이트
        function updateSlide() {
            const slides = document.querySelectorAll('.slide');
            slides.forEach((slide, index) => {
                slide.classList.toggle('active', index === currentSlide);
                // 슬라이드가 전환될 때마다 내용 영역의 스크롤 위치를 맨 위로 리셋
                if(index === currentSlide) {
                    const content = slide.querySelector('.slide-content');
                    if(content) content.scrollTop = 0;
                }
            });
            
            // 페이지 넘버 가독성 포맷 (01, 02 .. 형태)
            const pad = (n) => n < 10 ? '0' + n : n;
            document.getElementById('pageInfo').innerText = `${pad(currentSlide + 1)} / ${pad(devLogData.length)}`;
            
            document.getElementById('prevBtn').disabled = currentSlide === 0;
            document.getElementById('nextBtn').disabled = currentSlide === devLogData.length - 1;
        }

        function next() {
            if (currentSlide < devLogData.length - 1) {
                currentSlide++;
                updateSlide();
            }
        }

        function prev() {
            if (currentSlide > 0) {
                currentSlide--;
                updateSlide();
            }
        }

        // 컴포넌트 이벤트 연결
        document.getElementById('nextBtn').addEventListener('click', next);
        document.getElementById('prevBtn').addEventListener('click', prev);

        // 키보드 인터랙션 바인딩
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                e.preventDefault(); // 스페이스바 브라우저 기본 스크롤 내림 방지
                next();
            } else if (e.key === 'ArrowLeft') {
                prev();
            }
        });

        // 렌더링 시작
        createSlides();
        updateSlide();
    </script>
